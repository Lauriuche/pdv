<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#18181b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Terminal PDV PIX • Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: 'var(--primary-color)',
                        terminalBg: 'var(--bg-color)',
                        terminalText: 'var(--text-color)'
                    } 
                } 
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        :root { 
            --primary-color: #10b981; 
            --bg-color: #18181b;
            --text-color: #ffffff;
            --keypad-bg: #27272a;
            --keypad-text: #ffffff;
            --btn-bg: #ffffff;
            --btn-text: #000000;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            user-select: none; -webkit-user-select: none; 
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

        .display-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; contain: layout paint; }
        
        .main-digit { font-size: clamp(4rem, 15vw, 11rem); font-weight: 700; line-height: 0.8; letter-spacing: -0.05em; transition: color 0.2s ease; word-break: break-all; text-align: center; max-width: 90vw; will-change: color, opacity; }

        @keyframes soft-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .waiting-pulse { animation: soft-pulse 2s infinite ease-in-out; opacity: 0.4; }

        .instruction-text { font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2.5rem; text-align: center; transition: all 0.3s; }

        .keypad-section { padding: 16px; background: rgba(0,0,0,0.1); border-top: 1px solid rgba(255,255,255,0.05); contain: content; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
        .keypad-btn { background-color: var(--keypad-bg); color: var(--keypad-text); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 400; cursor: pointer; height: 74px; transition: filter 0.1s; border: 1px solid rgba(255,255,255,0.05); touch-action: manipulation; }
        .keypad-btn:active { filter: brightness(1.3); }
        .keypad-btn.special { color: var(--primary-color); font-weight: 800; }
        
        .btn-enter-pdv { background-color: var(--btn-bg); color: var(--btn-text); font-weight: 900; border-radius: 24px; font-size: 1.1rem; text-transform: uppercase; width: 100%; height: 68px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: filter 0.2s, transform 0.1s; cursor: pointer; }
        .btn-enter-pdv:active { filter: brightness(0.9); transform: scale(0.97); }

        .config-bar { background: rgba(0,0,0,0.2); padding: 18px 24px; border-radius: 999px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; width: 100%; border: 1px solid rgba(255,255,255,0.05); }
        .config-bar span { font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.9rem; }

        .btn-save-capsule { background: var(--primary-color); color: var(--bg-color); font-weight: 800; padding: 16px 0; border-radius: 999px; width: 70%; max-width: 320px; text-transform: uppercase; margin: 40px auto 20px auto; display: block; text-align: center; cursor: pointer; }

        .view-overlay { background: var(--bg-color); color: var(--text-color); z-index: 100; position: fixed; inset: 0; display: none; flex-direction: column; padding: 2.5rem 1.5rem; overflow-y: auto; }
        .view-overlay.active { display: flex; }

        .qr-giant-frame { background: #ffffff; padding: 5%; border-radius: 2rem; width: 85vw; max-width: 400px; aspect-ratio: 1/1; margin: 0 auto 2.5rem auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); position: relative; }
        #pix-qr-box, #wifi-qr-box, #whatsapp-qr { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .qr-giant-frame canvas, .qr-giant-frame img { max-width: 100% !important; max-height: 100% !important; width: 100% !important; height: auto !important; object-fit: contain; border-radius: 0; image-rendering: pixelated; }

        .minimal-input { width: 100%; background: rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; font-size: 1rem; outline: none; transition: border-color 0.3s; color: var(--text-color); }
        .minimal-input:focus { border-color: var(--primary-color); }
        
        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 40px; border-radius: 8px; cursor: pointer; padding: 0; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body id="app-body">

    <div id="view-settings" class="view-overlay">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs", authDomain: "indisponivel-rrehfe.firebaseapp.com", databaseURL: "https://indisponivel-rrehfe.firebaseio.com", projectId: "indisponivel-rrehfe", storageBucket: "indisponivel-rrehfe.firebasestorage.app", messagingSenderId: "880210924564", appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301" };
    const safeAppId = 'pdv_premium_main';
    
    let db, auth;
    let lastPixString = "", currentDigits = "";
    let salesData = [];
    let terminalConfig = { 
        terminalName: "CAIXA", mpApiKey: "", pixKey: "", wifiSSID: "", wifiPass: "", whatsapp: "351999999999", useVirtualKb: true,
        bgColor: "#18181b", textColor: "#ffffff", primaryColor: "#10b981", keypadBg: "#27272a", keypadText: "#ffffff", btnBg: "#ffffff", btnText: "#000000"
    };
    
    let paymentCheckInterval = null;
    let inactivityTimerLeft = 60;
    let inactivityInterval = null;

    function generateSafeId() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function crc16(str) {
        let crc = 0xFFFF;
        for (let c = 0; c < str.length; c++) {
            crc ^= str.charCodeAt(c) << 8;
            for (let i = 0; i < 8; i++) {
                if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
                else crc = crc << 1;
            }
        }
        return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
    }

    const themePresets = {
        'carbon': { bg: '#18181b', text: '#ffffff', primary: '#10b981', keyBg: '#27272a', keyText: '#ffffff', btnBg: '#ffffff', btnText: '#000000' },
        'oled': { bg: '#000000', text: '#ffffff', primary: '#10b981', keyBg: '#111111', keyText: '#ffffff', btnBg: '#10b981', btnText: '#000000' },
        'ocean': { bg: '#0f172a', text: '#f8fafc', primary: '#3b82f6', keyBg: '#1e293b', keyText: '#f8fafc', btnBg: '#3b82f6', btnText: '#ffffff' },
        'terracotta': { bg: '#3E2723', text: '#FFDAB9', primary: '#CD5C5C', keyBg: '#4E342E', keyText: '#FFDAB9', btnBg: '#CD5C5C', btnText: '#ffffff' },
        'gold': { bg: '#1A202C', text: '#FEFCBF', primary: '#D69E2E', keyBg: '#2D3748', keyText: '#FEFCBF', btnBg: '#D69E2E', btnText: '#1A202C' },
        'ruby': { bg: '#2F4F4F', text: '#FFFAFA', primary: '#DC143C', keyBg: '#3E6161', keyText: '#FFFAFA', btnBg: '#DC143C', btnText: '#ffffff' },
        'emerald': { bg: '#0b1d1a', text: '#F5FFFA', primary: '#20B2AA', keyBg: '#14332e', keyText: '#F5FFFA', btnBg: '#20B2AA', btnText: '#0b1d1a' }
    };

    const dom = {
        valDisplay: document.getElementById('display-value'),
        msgBox: document.getElementById('message-box'),
        msgText: document.getElementById('message-text'),
        statusDot: document.getElementById('status-dot'),
        statusLabel: document.getElementById('terminal-name-label')
    };

    const initFirebase = async () => {
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getDatabase(app);
            await signInAnonymously(auth);
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    onValue(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/v4`), (snap) => {
                        if (snap.exists()) { terminalConfig = { ...terminalConfig, ...snap.val() }; applyThemeSettings(); }
                        updateNetworkUI();
                    });

                    onValue(ref(db, `artifacts/${safeAppId}/public/data/sales`), (snapshot) => {
                        salesData = [];
                        const oneMonthAgo = new Date(); oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
                        snapshot.forEach(childSnapshot => {
                            const data = childSnapshot.val();
                            if (new Date(data.timestamp) < oneMonthAgo) remove(childSnapshot.ref);
                            else salesData.push({ id: childSnapshot.key, ...data });
                        });
                        salesData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        renderSales();
                    });
                }
            });
        } catch (e) {
            updateNetworkUI(false);
            applyThemeSettings();
        }
    };

    function updateNetworkUI(forceOffline = false) {
        if (navigator.onLine && !forceOffline) {
            dom.statusDot.className = "w-3 h-3 bg-emerald-500 rounded-full";
            dom.statusLabel.textContent = terminalConfig.terminalName || "ONLINE";
        } else {
            dom.statusDot.className = "w-3 h-3 bg-red-500 rounded-full animate-pulse";
            dom.statusLabel.textContent = "SEM INTERNET";
        }
    }
    window.addEventListener('online', () => updateNetworkUI());
    window.addEventListener('offline', () => updateNetworkUI());

    function startInactivityTimer() {
        inactivityTimerLeft = 60;
        if (inactivityInterval) clearInterval(inactivityInterval);
        inactivityInterval = setInterval(() => {
            inactivityTimerLeft--;
            if (inactivityTimerLeft <= 0) { window.resetApp(); startInactivityTimer(); }
        }, 1000);
    }
    function resetActivity() { inactivityTimerLeft = 60; }
    ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(e => window.addEventListener(e, resetActivity));

    document.body.addEventListener('click', (e) => { 
        if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {}); 
    });

    window.resetApp = () => { 
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.remove('active')); 
        currentDigits = ""; 
        if (paymentCheckInterval) clearInterval(paymentCheckInterval);
        updateDisplay(); 
    };

    window.pressKey = (key) => {
        if (key === 'back') { 
            if (document.querySelectorAll('.view-overlay.active').length > 0) { window.resetApp(); return; }
            currentDigits = currentDigits.slice(0, -1); 
        } 
        else if (key === '*') { if (currentDigits === "") showWifi(terminalConfig.wifiSSID, terminalConfig.wifiPass); return; }
        else { if (currentDigits.length < 10) currentDigits += key; }
        updateDisplay();
    };

    window.handleAction = () => {
        try {
            const v = currentDigits === "" ? 0 : parseInt(currentDigits);
            if (v <= 0) { window.showMessage("DIGITE UM VALOR"); return; }
            
            const cents = v % 100;
            if (cents === 1 && v < 100) { showWifi(terminalConfig.wifiSSID, terminalConfig.wifiPass); return; }
            if (cents === 2 && v < 100) { showSupport(); return; }
            if (cents === 3 && v < 100) { window.toggleSettings(); currentDigits = ""; updateDisplay(); return; }
            if (cents === 4 && v < 100) { showSalesHistory(); return; }

            window.processSale(v / 100); 
        } catch (err) { window.showMessage("ERRO LOCAL: " + err.message); }
    };

    function updateDisplay() {
        const label = document.getElementById('instruction-label');
        if (!currentDigits) {
            dom.valDisplay.classList.add('waiting-pulse');
            dom.valDisplay.textContent = "0,00";
            dom.valDisplay.style.color = ''; 
            label.textContent = "DIGITE O VALOR"; label.style.color = "";
        } else {
            dom.valDisplay.classList.remove('waiting-pulse');
            const v = parseInt(currentDigits);
            dom.valDisplay.textContent = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            dom.valDisplay.style.color = 'var(--primary-color)';
            
            if(currentDigits.length >= 1 && currentDigits.endsWith('1') && v < 100) { label.textContent = "ABRIR WI-FI"; label.style.color = "var(--primary-color)"; }
            else if(currentDigits.length >= 1 && currentDigits.endsWith('2') && v < 100) { label.textContent = "ABRIR SUPORTE"; label.style.color = "var(--primary-color)"; }
            else if(currentDigits.length >= 1 && currentDigits.endsWith('3') && v < 100) { label.textContent = "DEFINIÇÕES"; label.style.color = "var(--primary-color)"; }
            else if(currentDigits.length >= 1 && currentDigits.endsWith('4') && v < 100) { label.textContent = "VER VENDAS"; label.style.color = "var(--primary-color)"; }
            else { label.textContent = "GERAR COBRANÇA"; label.style.color = ""; }
        }
    }

    // --- SISTEMA ANTI-CORS / PROXY SEGURO ---
    async function safeFetchMP(url, options) {
        try {
            // Tenta comunicação direta (Funciona em alguns ambientes ou apps compilados)
            const response = await fetch(url, options);
            if (!response.ok) throw new Error("API Recusada");
            return response;
        } catch (error) {
            console.warn("Bloqueio de CORS detetado. A redirecionar para Proxy Seguro 1...");
            try {
                // Proxy 1 (Corsproxy.io)
                const proxyUrl1 = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response1 = await fetch(proxyUrl1, options);
                if (!response1.ok) throw new Error("Proxy 1 Recusado");
                return response1;
            } catch (error2) {
                console.warn("Proxy 1 falhou. A redirecionar para Proxy Seguro 2...");
                // Proxy 2 (Thingproxy Freeboard)
                const proxyUrl2 = 'https://thingproxy.freeboard.io/fetch/' + url;
                return await fetch(proxyUrl2, options);
            }
        }
    }

    window.processSale = async (amount) => {
        document.getElementById('view-pix').classList.add('active');
        document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        const qrBox = document.getElementById('pix-qr-box');
        const statusText = document.getElementById('pix-status-text');
        
        qrBox.innerHTML = '<div class="font-bold text-sm animate-pulse flex flex-col items-center gap-2"><svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>A processar ligação segura...</div>';
        statusText.textContent = "A COMUNICAR COM O BANCO...";
        statusText.classList.remove("text-red-500", "text-zinc-500");
        statusText.classList.add("text-primary");

        const token = terminalConfig.mpApiKey;
        const chavePix = terminalConfig.pixKey;
        let successMP = false;

        if (token && token.length > 10) {
            try {
                const bodyData = JSON.stringify({ 
                    transaction_amount: amount, 
                    description: `Venda ${terminalConfig.terminalName}`, 
                    payment_method_id: 'pix', 
                    payer: { email: 'cliente@pdv.com', first_name: 'Cliente', last_name: 'Avulso' } 
                });
                
                // Usa a nova função Anti-CORS
                const response = await safeFetchMP('https://api.mercadopago.com/v1/payments', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'X-Idempotency-Key': generateSafeId() },
                    body: bodyData
                });
                
                const data = await response.json();
                
                if (data.point_of_interaction && data.point_of_interaction.transaction_data.qr_code) {
                    lastPixString = data.point_of_interaction.transaction_data.qr_code;
                    qrBox.innerHTML = "";
                    new QRCode(qrBox, { text: lastPixString, width: 256, height: 256, colorDark: "#000000", colorLight: "#ffffff" });
                    
                    statusText.textContent = "A AGUARDAR PAGAMENTO...";
                    paymentCheckInterval = setInterval(() => checkPaymentStatus(data.id, token, amount), 5000);
                    successMP = true;
                } else {
                    console.error("Falha na Resposta:", data);
                }
            } catch (error) { 
                console.warn("Mercado Pago indisponível. A ativar Plano B."); 
            }
        } 
        
        // PLANO B
        if (!successMP) {
            if (!chavePix || chavePix === "") {
                qrBox.innerHTML = `<div class="text-red-500 font-bold p-6 text-center border-2 border-red-500/20 rounded-[1.5rem] bg-red-500/10"><span class="text-[13px] uppercase tracking-widest mb-2">Erro de Serviço</span><span class="text-[10px] opacity-70 font-normal leading-relaxed">Não configurou uma Chave PIX Padrão. A API falhou.</span></div>`;
                statusText.textContent = "FALHA"; statusText.classList.replace("text-primary", "text-red-500");
                return;
            }
            const valorFormatado = amount.toFixed(2);
            const tamValor = valorFormatado.length.toString().padStart(2, '0');
            const tamChave = chavePix.length.toString().padStart(2, '0');
            const payload = `00020101021126${(22 + chavePix.length).toString().padStart(2,'0')}0014BR.GOV.BCB.PIX01${tamChave}${chavePix}52040000530398654${tamValor}${valorFormatado}5802BR5903PDV6009SAO PAULO62070503***6304`;
            lastPixString = payload + crc16(payload);
            qrBox.innerHTML = ""; 
            new QRCode(qrBox, { text: lastPixString, width: 256, height: 256, colorDark: "#000000", colorLight: "#ffffff" });
            
            statusText.textContent = "PIX NATIVO (PLANO B)"; statusText.classList.replace("text-primary", "text-zinc-500");
        }
    }

    async function checkPaymentStatus(paymentId, token, amount) {
        try {
            // Usa a mesma função Anti-CORS para ler o estado do pagamento sem bloquear
            const res = await safeFetchMP(`https://api.mercadopago.com/v1/payments/${paymentId}`, { 
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` } 
            }); 
            
            const data = await res.json();
            if (data.status === 'approved') {
                clearInterval(paymentCheckInterval);
                triggerSuccessPayment(amount);
            }
        } catch(e) { } 
    }

    function triggerSuccessPayment(amount) {
        if (db && auth && auth.currentUser) {
            push(ref(db, `artifacts/${safeAppId}/public/data/sales`), { amount: amount, timestamp: new Date().toISOString(), method: 'PIX', status: 'Aprovado' }).catch(()=>{});
        }

        try { const somCaixa = new Audio('https://www.myinstants.com/media/sounds/cash-register-kaching-sound-effect-audio-library.mp3'); somCaixa.play().catch(()=>{}); } catch (e) {}

        document.getElementById('view-pix').classList.remove('active');
        document.getElementById('view-success').classList.add('active');
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: [getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim(), '#ffffff'] });

        setTimeout(() => window.resetApp(), 5000); 
    }

    function renderSales() {
        const container = document.getElementById('sales-list');
        const totalEl = document.getElementById('sales-total');
        if (!container) return;

        container.innerHTML = ""; let total = 0;

        if (salesData.length === 0) {
            container.innerHTML = `<p class="text-zinc-600 text-xs text-center mt-10 uppercase tracking-widest">Sem vendas recentes.</p>`;
        } else {
            salesData.forEach(sale => {
                total += sale.amount;
                const d = new Date(sale.timestamp);
                const dateStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-black/30 p-4 rounded-xl border border-white/5">
                        <div>
                            <p class="text-[9px] text-zinc-500 uppercase tracking-widest mb-1">${dateStr}</p>
                            <p class="text-xs font-bold text-primary">${sale.method} <span class="text-zinc-600 ml-1 font-normal">• ${sale.status}</span></p>
                        </div>
                        <span class="font-bold">${sale.amount.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}</span>
                    </div>`;
            });
        }
        totalEl.textContent = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
    }

    function showWifi(ssid, pass) { 
        document.getElementById('view-wifi').classList.add('active'); 
        document.getElementById('wifi-ssid-val').textContent = ssid || "NÃO CONFIGURADO"; 
        document.getElementById('wifi-qr-box').innerHTML=""; 
        new QRCode(document.getElementById('wifi-qr-box'), { text: `WIFI:T:WPA;S:${ssid};P:${pass};;`, width: 256, height: 256, colorDark: "#000000", colorLight: "#ffffff" }); 
    }

    function showSupport() {
        document.getElementById('view-support').classList.add('active'); 
        document.getElementById('whatsapp-qr').innerHTML=""; 
        new QRCode(document.getElementById('whatsapp-qr'), { text: `https://wa.me/${terminalConfig.whatsapp}`, width: 256, height: 256, colorDark: "#000000", colorLight: "#ffffff" }); 
    }

    function showSalesHistory() {
        document.getElementById('view-sales').classList.add('active');
        renderSales();
    }

    window.toggleAcc = (id) => {
        const el = document.getElementById(id);
        const isHidden = el.classList.contains('hidden');
        document.querySelectorAll('[id^="acc-"]').forEach(acc => acc.classList.add('hidden'));
        if (isHidden) el.classList.remove('hidden');
    }

    window.toggleSettings = () => {
        const v = document.getElementById('view-settings');
        if (v.classList.contains('active')) window.resetApp();
        else {
            const g = (id) => document.getElementById(id);
            g('input-terminal-name').value = terminalConfig.terminalName || "";
            g('input-pix-key').value = terminalConfig.pixKey || "";
            g('input-api-key').value = terminalConfig.mpApiKey || "";
            g('input-wifi-ssid').value = terminalConfig.wifiSSID || "";
            g('input-wifi-pass').value = terminalConfig.wifiPass || "";
            g('input-whatsapp').value = terminalConfig.whatsapp || "";
            g('input-use-virtual-kb').checked = terminalConfig.useVirtualKb !== false;
            
            g('cfg-bg-color').value = terminalConfig.bgColor || "#18181b";
            g('cfg-text-color').value = terminalConfig.textColor || "#ffffff";
            g('cfg-primary-color').value = terminalConfig.primaryColor || "#10b981";
            g('cfg-keypad-bg').value = terminalConfig.keypadBg || "#27272a";
            g('cfg-keypad-text').value = terminalConfig.keypadText || "#ffffff";
            g('cfg-btn-bg').value = terminalConfig.btnBg || "#ffffff";
            g('cfg-btn-text').value = terminalConfig.btnText || "#000000";
            
            g('input-preset-theme').value = 'custom';
            v.classList.add('active');
        }
    };

    window.applyPresetTheme = () => {
        const selected = document.getElementById('input-preset-theme').value;
        if (selected === 'custom' || !themePresets[selected]) return;
        const theme = themePresets[selected];
        document.getElementById('cfg-bg-color').value = theme.bg; document.getElementById('cfg-text-color').value = theme.text; document.getElementById('cfg-primary-color').value = theme.primary; document.getElementById('cfg-keypad-bg').value = theme.keyBg; document.getElementById('cfg-keypad-text').value = theme.keyText; document.getElementById('cfg-btn-bg').value = theme.btnBg; document.getElementById('cfg-btn-text').value = theme.btnText;
        window.previewTheme();
    };

    window.previewTheme = () => { 
        document.documentElement.style.setProperty('--bg-color', document.getElementById('cfg-bg-color').value);
        document.documentElement.style.setProperty('--text-color', document.getElementById('cfg-text-color').value);
        document.documentElement.style.setProperty('--primary-color', document.getElementById('cfg-primary-color').value);
        document.documentElement.style.setProperty('--keypad-bg', document.getElementById('cfg-keypad-bg').value);
        document.documentElement.style.setProperty('--keypad-text', document.getElementById('cfg-keypad-text').value);
        document.documentElement.style.setProperty('--btn-bg', document.getElementById('cfg-btn-bg').value);
        document.documentElement.style.setProperty('--btn-text', document.getElementById('cfg-btn-text').value);
        document.getElementById('input-preset-theme').value = 'custom'; 
    };

    window.saveSettings = async () => {
        const gV = (id) => document.getElementById(id).value;
        const cfg = { 
            terminalName: gV('input-terminal-name'), pixKey: gV('input-pix-key'), mpApiKey: gV('input-api-key'),
            wifiSSID: gV('input-wifi-ssid'), wifiPass: gV('input-wifi-pass'), whatsapp: gV('input-whatsapp'),
            useVirtualKb: document.getElementById('input-use-virtual-kb').checked,
            bgColor: gV('cfg-bg-color'), textColor: gV('cfg-text-color'), primaryColor: gV('cfg-primary-color'),
            keypadBg: gV('cfg-keypad-bg'), keypadText: gV('cfg-keypad-text'), btnBg: gV('cfg-btn-bg'), btnText: gV('cfg-btn-text')
        };
        
        terminalConfig = { ...terminalConfig, ...cfg };
        applyThemeSettings();
        
        try {
            await set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/v4`), cfg);
            window.showMessage("DEFINIÇÕES SALVAS NA NUVEM!");
        } catch (e) { window.showMessage("SALVO APENAS NESTE DISPOSITIVO"); }
        window.resetApp(); 
    };

    const applyThemeSettings = () => { 
        document.documentElement.style.setProperty('--bg-color', terminalConfig.bgColor || '#18181b');
        document.documentElement.style.setProperty('--text-color', terminalConfig.textColor || '#ffffff');
        document.documentElement.style.setProperty('--primary-color', terminalConfig.primaryColor || '#10b981');
        document.documentElement.style.setProperty('--keypad-bg', terminalConfig.keypadBg || '#27272a');
        document.documentElement.style.setProperty('--keypad-text', terminalConfig.keypadText || '#ffffff');
        document.documentElement.style.setProperty('--btn-bg', terminalConfig.btnBg || '#ffffff');
        document.documentElement.style.setProperty('--btn-text', terminalConfig.btnText || '#000000');
        
        document.getElementById('keypad-ui').style.display = (terminalConfig.useVirtualKb !== false) ? 'block' : 'none';
        updateNetworkUI();
    };
    
    window.showMessage = (t) => { 
        dom.msgText.textContent = t; 
        dom.msgBox.style.opacity = "1"; 
        setTimeout(() => dom.msgBox.style.opacity = "0", 2500); 
    };

    window.copyPix = () => {
        const e = document.createElement('textarea'); e.value = lastPixString; document.body.appendChild(e); e.select(); 
        document.execCommand('copy'); document.body.removeChild(e); window.showMessage("PIX COPIADO!");
    };

    window.addEventListener('load', () => {
        lucide.createIcons(); initFirebase(); startInactivityTimer();
        setInterval(() => { 
            const d = new Date();
            document.getElementById('clock').textContent = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0') + ":" + d.getSeconds().toString().padStart(2, '0');
        }, 1000);
        updateDisplay();
    });

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (e.key === 'Escape' || e.key === 'Backspace') { window.pressKey('back'); return; }
        if (document.querySelectorAll('.view-overlay.active').length > 0) return;
        if (e.key === 'Enter') window.handleAction();
        else if (e.key === '*' || e.key === 'x') window.pressKey('*');
        else if (e.key >= '0' && e.key <= '9') window.pressKey(e.key);
    });
</script>
